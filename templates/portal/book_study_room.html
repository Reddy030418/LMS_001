{% extends 'portal/base.html' %}
{% load static %}

{% block title %}Book a Study Room - ANU LMS{% endblock %}

{% block content %}
<div class="app-view">
  <div class="row justify-content-center">
    <div class="col-lg-7 col-md-9">
      <div class="text-center mb-4">
        <div style="width:70px;height:70px;border-radius:50%;background:rgba(16,185,129,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
          <i class="fa-solid fa-door-open fa-xl" style="color:var(--accent-emerald);"></i>
        </div>
        <h1 style="font-size:1.75rem;background:var(--gradient-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">{{ title }}</h1>
        <p class="text-muted">Reserve a quiet study space at ANU Central Library</p>
      </div>

      <div class="dashboard-card">
        <div class="row g-3 mb-4">
          <div class="col-md-4 text-center">
            <div style="width:50px;height:50px;border-radius:50%;background:rgba(99,102,241,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 0.5rem;">
              <i class="fa-solid fa-wifi" style="color:var(--accent-indigo);"></i>
            </div>
            <small class="text-muted">Free Wi-Fi</small>
          </div>
          <div class="col-md-4 text-center">
            <div style="width:50px;height:50px;border-radius:50%;background:rgba(6,182,212,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 0.5rem;">
              <i class="fa-solid fa-plug" style="color:var(--accent-cyan);"></i>
            </div>
            <small class="text-muted">Power Outlets</small>
          </div>
          <div class="col-md-4 text-center">
            <div style="width:50px;height:50px;border-radius:50%;background:rgba(245,158,11,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 0.5rem;">
              <i class="fa-solid fa-users" style="color:var(--accent-amber);"></i>
            </div>
            <small class="text-muted">Up to 6 People</small>
          </div>
        </div>

        <hr style="border-color:var(--border-color);">

        <form method="post" action="{% url 'book_study_room' %}">
          {% csrf_token %}
          <div class="mb-3">
            <label for="date" class="form-label">Preferred Date</label>
            <input type="date" class="form-control" id="date" name="date" required>
          </div>
          <div class="mb-3">
            <label for="time" class="form-label">Preferred Time</label>
            <select class="form-select" id="time" name="time" required>
              <option value="">Select a time slot</option>
              <option value="08:00-10:00">8:00 AM – 10:00 AM</option>
              <option value="10:00-12:00">10:00 AM – 12:00 PM</option>
              <option value="12:00-14:00">12:00 PM – 2:00 PM</option>
              <option value="14:00-16:00">2:00 PM – 4:00 PM</option>
              <option value="16:00-18:00">4:00 PM – 6:00 PM</option>
              <option value="18:00-20:00">6:00 PM – 8:00 PM</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary w-100" style="padding:0.75rem;">
            <i class="fa-solid fa-calendar-check me-2"></i>Reserve Study Room
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
