{% extends 'portal/base.html' %}
{% load static %}

{% block title %}Reading: {{ eresource.name }} - ANU LMS{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="fa-solid fa-book-open text-primary me-2"></i>{{ eresource.name }}</h2>
        <a href="{% url 'eresource_list' letter=eresource.letter %}" class="btn btn-outline-secondary">
            <i class="fa-solid fa-arrow-left me-1"></i>Back to List
        </a>
    </div>

    <!-- PDF Reader Container -->
    <div class="card shadow-sm border-0" style="height: 80vh;">
        <div class="card-body p-0">
            <iframe src="{{ eresource.file.url }}" width="100%" height="100%" style="border: none;"></iframe>
        </div>
    </div>
</div>
{% endblock %}
