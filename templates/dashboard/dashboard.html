{% extends 'portal/base.html' %}

{% block title %}Dashboard - ANU LMS{% endblock %}

{% block content %}
<div class="app-view">
    <h1 style="font-size:1.75rem;background:var(--gradient-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
        <i class="fa-solid fa-chart-line me-2"></i>Library Dashboard
    </h1>

    <div class="row g-3 mt-3">
        <div class="col-md-3">
            <div class="dashboard-card text-center">
                <h3>{{ total_books }}</h3>
                <p class="text-muted mb-0">Total Books</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="dashboard-card text-center">
                <h3>{{ total_members }}</h3>
                <p class="text-muted mb-0">Total Members</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="dashboard-card text-center">
                <h3>{{ active_loans }}</h3>
                <p class="text-muted mb-0">Active Loans</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="dashboard-card text-center">
                <h3>{{ overdue_count }}</h3>
                <p class="text-muted mb-0">Overdue Books</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
